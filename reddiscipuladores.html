<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Red de Discipuladores - Misiones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --azul-oscuro: #0a192f;
            --blanco-fondo: #ffffff;
            --texto-principal: #0a192f;
            --rojo-alerta: #d63031;
            --naranja-resalte: #ff9f43;
            --gris-claro: #f1f2f6;
            --celeste-resalte: #00b4d8;
            --verde-exito: #00b894;
        }

        body {
            background-color: var(--blanco-fondo);
            color: var(--texto-principal);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header estilo app - altura reducida y texto centrado */
        .app-header {
            background: var(--azul-oscuro);
            padding: 12px 20px;  /* reducción significativa del padding vertical */
            display: flex;
            flex-wrap: wrap;
            justify-content: center;  /* centra horizontalmente el contenido */
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }

        .title-section {
            text-align: center;
        }
        .title-section h1 {
            color: white;
            font-size: 1.4rem;    /* tamaño ligeramente más compacto */
            font-weight: 700;
            letter-spacing: -0.2px;
            margin: 0;
        }
        .title-section p {
            color: rgba(255,255,255,0.8);
            font-size: 0.75rem;
            margin-top: 2px;
        }

        .btn-nuevo {
            background: var(--naranja-resalte);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.85rem;
            color: #1e2a3a;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            white-space: nowrap;
        }
        .btn-nuevo:hover {
            background: #e67e22;
            transform: scale(1.02);
            color: white;
        }

        /* Contenedor principal */
        .main-container {
            flex: 1;
            padding: 30px 20px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Grid de departamentos */
        .departments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 28px;
            margin-top: 10px;
        }

        /* Módulo tarjeta de cada departamento (glassmorfismo) */
        .dept-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(0, 180, 216, 0.2);
        }
        .dept-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.12);
        }

        .dept-header {
            background: var(--azul-oscuro);
            padding: 14px 20px;
            color: white;
        }
        .dept-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dept-header span {
            font-size: 0.75rem;
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 30px;
        }

        .discipulos-list {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-height: 400px;
            overflow-y: auto;
        }

        /* Tarjeta individual de discipulador */
        .discipulo-item {
            background: white;
            border-radius: 18px;
            padding: 14px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            transition: all 0.2s;
            border-left: 4px solid var(--celeste-resalte);
            position: relative;
        }
        .discipulo-item:hover {
            background: #fef9f0;
        }

        .discipulo-nombre {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--azul-oscuro);
            margin-bottom: 6px;
        }
        .discipulo-rol {
            font-size: 0.75rem;
            background: var(--gris-claro);
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e66;
        }
        .discipulo-contacto {
            font-size: 0.8rem;
            color: #2d3436;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 6px;
        }
        .discipulo-contacto span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .acciones {
            margin-top: 12px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .btn-editar, .btn-eliminar {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px 8px;
            border-radius: 30px;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn-editar {
            color: var(--celeste-resalte);
        }
        .btn-editar:hover {
            background: rgba(0, 180, 216, 0.1);
        }
        .btn-eliminar {
            color: var(--rojo-alerta);
        }
        .btn-eliminar:hover {
            background: rgba(214, 48, 49, 0.1);
        }
        .empty-message {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.85rem;
            padding: 20px;
            font-style: italic;
        }

        /* MODAL ESTILO GLASS */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 25, 47, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-card {
            background: white;
            width: 90%;
            max-width: 500px;
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
            animation: fadeInUp 0.3s ease;
        }
        .modal-card h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--azul-oscuro);
            border-left: 5px solid var(--naranja-resalte);
            padding-left: 15px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: #2c3e50;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 16px;
            border: 1px solid #ddd;
            font-size: 0.9rem;
            transition: 0.2s;
            background: #f9f9ff;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--celeste-resalte);
            box-shadow: 0 0 0 2px rgba(0,180,216,0.2);
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-guardar {
            background: var(--celeste-resalte);
            color: white;
        }
        .btn-cancelar {
            background: var(--gris-claro);
            color: #2d3436;
        }
        .btn-guardar:hover { background: #0096b4; }
        .btn-cancelar:hover { background: #e0e0e0; }

        /* Footer */
        .app-footer {
            background: var(--azul-oscuro);
            color: white;
            text-align: center;
            padding: 12px;
            font-size: 0.7rem;
            margin-top: 20px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive: ajustes adicionales para móvil */
        @media (max-width: 768px) {
            .app-header {
                flex-direction: column;
                padding: 10px 16px;
                gap: 8px;
            }
            .title-section h1 {
                font-size: 1.2rem;
            }
            .title-section p {
                font-size: 0.7rem;
            }
            .btn-nuevo {
                padding: 6px 16px;
                font-size: 0.8rem;
            }
            .departments-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .discipulos-list {
                max-height: 350px;
            }
            .dept-header h2 {
                font-size: 1.1rem;
            }
        }

        /* Scroll personalizado */
        .discipulos-list::-webkit-scrollbar {
            width: 5px;
        }
        .discipulos-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .discipulos-list::-webkit-scrollbar-thumb {
            background: var(--celeste-resalte);
            border-radius: 10px;
        }
    </style>
</head>
<body>

<header class="app-header">
    <div class="title-section">
        <h1>🌍 Red de Discipuladores · Misiones</h1>
        <p>Multiplicación, formación y envío — cada departamento activo</p>
    </div>
    <button class="btn-nuevo" id="btnNuevoRegistro">➕ Nuevo discipulador</button>
</header>

<main class="main-container" id="appMain">
    <!-- Aquí se renderizarán dinámicamente los departamentos con sus tarjetas -->
    <div id="departmentsContainer" class="departments-grid"></div>
</main>

<footer class="app-footer">
    <p>📌 Red de Discipuladores - Enfoque Misiones | Gestión integral de líderes y misioneros | Datos guardados localmente</p>
</footer>

<!-- Modal para agregar/editar -->
<div id="modalForm" class="modal-overlay">
    <div class="modal-card">
        <h3 id="modalTitle">➕ Nuevo Discipulador</h3>
        <form id="discipuloForm">
            <input type="hidden" id="editId" value="">
            <div class="form-group">
                <label>Nombre *</label>
                <input type="text" id="nombre" required placeholder="Ej: Juan">
            </div>
            <div class="form-group">
                <label>Apellido *</label>
                <input type="text" id="apellido" required placeholder="Ej: Pérez">
            </div>
            <div class="form-group">
                <label>Departamento *</label>
                <select id="departamento" required>
                    <option value="">Seleccionar...</option>
                    <option value="Apóstoles">Apóstoles</option>
                    <option value="Cainguás">Cainguás</option>
                    <option value="Candelaria">Candelaria</option>
                    <option value="Capital (Posadas)">Capital (Posadas)</option>
                    <option value="Concepción">Concepción</option>
                    <option value="Eldorado">Eldorado</option>
                    <option value="General Manuel Belgrano">General Manuel Belgrano</option>
                    <option value="Guaraní">Guaraní</option>
                    <option value="Iguazú">Iguazú</option>
                    <option value="Leandro N. Alem">Leandro N. Alem</option>
                    <option value="Libertador General San Martín">Libertador General San Martín</option>
                    <option value="Montecarlo">Montecarlo</option>
                    <option value="Oberá">Oberá</option>
                    <option value="San Ignacio">San Ignacio</option>
                    <option value="San Javier">San Javier</option>
                    <option value="San Pedro">San Pedro</option>
                    <option value="Veinticinco de Mayo">Veinticinco de Mayo</option>
                </select>
            </div>
            <div class="form-group">
                <label>Rol / Función</label>
                <input type="text" id="rol" placeholder="Ej: Coordinador Departamental, Misionero, Líder de Grupo">
            </div>
            <div class="form-group">
                <label>Teléfono</label>
                <input type="tel" id="telefono" placeholder="+54 376 4xxxxxx">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="discipulo@misiones.org">
            </div>
            <div class="modal-buttons">
                <button type="submit" class="btn-guardar">💾 Guardar</button>
                <button type="button" class="btn-cancelar" id="btnCancelModal">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script>
    // ---------- LISTA DE DEPARTAMENTOS DE MISIONES (Argentina) ----------
    const DEPARTAMENTOS_MISIONES = [
        "Apóstoles", "Cainguás", "Candelaria", "Capital (Posadas)", "Concepción",
        "Eldorado", "General Manuel Belgrano", "Guaraní", "Iguazú", "Leandro N. Alem",
        "Libertador General San Martín", "Montecarlo", "Oberá", "San Ignacio",
        "San Javier", "San Pedro", "Veinticinco de Mayo"
    ];

    // Clave para localStorage
    const STORAGE_KEY = "red_discipuladores_misiones";

    // Modelo de datos: array de discipuladores
    let discipuladores = [];

    // Cargar datos iniciales desde localStorage o datos demo
    function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            discipuladores = JSON.parse(stored);
        } else {
            // Datos de ejemplo para demostración
            discipuladores = [
                { id: "1", nombre: "María", apellido: "Gómez", departamento: "Capital (Posadas)", rol: "Coordinadora Regional", telefono: "3765123456", email: "maria@redmisiones.org" },
                { id: "2", nombre: "Lucas", apellido: "Fernández", departamento: "Iguazú", rol: "Misionero Urbano", telefono: "3757123456", email: "lucas@redmisiones.org" },
                { id: "3", nombre: "Estela", apellido: "Rodríguez", departamento: "Oberá", rol: "Líder de Discipulado", telefono: "3755123456", email: "estela@redmisiones.org" },
                { id: "4", nombre: "David", apellido: "Acosta", departamento: "Eldorado", rol: "Pastor de Misiones", telefono: "3751123456", email: "david@redmisiones.org" }
            ];
            saveToLocalStorage();
        }
    }

    function saveToLocalStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(discipuladores));
    }

    // Función para generar ID único
    function generateId() {
        return Date.now().toString(36) + Math.random().toString(36).substring(2);
    }

    // Agregar o actualizar discipulador
    function saveDiscipulo(data) {
        if (data.id) {
            // Edición
            const index = discipuladores.findIndex(d => d.id === data.id);
            if (index !== -1) {
                discipuladores[index] = { ...discipuladores[index], ...data };
            }
        } else {
            // Nuevo
            const newDiscipulo = { ...data, id: generateId() };
            discipuladores.push(newDiscipulo);
        }
        saveToLocalStorage();
        renderAllDepartments();
    }

    function deleteDiscipulo(id) {
        if (confirm("¿Eliminar este discipulador de la red?")) {
            discipuladores = discipuladores.filter(d => d.id !== id);
            saveToLocalStorage();
            renderAllDepartments();
        }
    }

    // Obtener discipuladores agrupados por departamento
    function getGroupedByDepartment() {
        const grouped = {};
        DEPARTAMENTOS_MISIONES.forEach(dept => { grouped[dept] = []; });
        discipuladores.forEach(d => {
            if (grouped[d.departamento]) {
                grouped[d.departamento].push(d);
            } else {
                // Si por algún motivo el departamento no está en la lista, lo agregamos como extra (pero no debería)
                if (!grouped[d.departamento]) grouped[d.departamento] = [];
                grouped[d.departamento].push(d);
            }
        });
        // Ordenar los discipuladores por apellido dentro de cada grupo
        for (let dept in grouped) {
            grouped[dept].sort((a,b) => (a.apellido + a.nombre).localeCompare(b.apellido + b.nombre));
        }
        return grouped;
    }

    // Renderizar todos los módulos (departamentos con tarjetas)
    function renderAllDepartments() {
        const container = document.getElementById("departmentsContainer");
        if (!container) return;
        const grouped = getGroupedByDepartment();
        
        let html = '';
        for (let dept of DEPARTAMENTOS_MISIONES) {
            const discipulos = grouped[dept] || [];
            const count = discipulos.length;
            html += `
                <div class="dept-card">
                    <div class="dept-header">
                        <h2>📌 ${dept} <span>${count} discípulo(s)</span></h2>
                    </div>
                    <div class="discipulos-list">
            `;
            if (discipulos.length === 0) {
                html += `<div class="empty-message">✨ Aún no hay discipuladores registrados. Usa "Nuevo registro" para sumar líderes y misioneros.</div>`;
            } else {
                discipulos.forEach(d => {
                    html += `
                        <div class="discipulo-item" data-id="${d.id}">
                            <div class="discipulo-nombre">${escapeHtml(d.nombre)} ${escapeHtml(d.apellido)}</div>
                            <div class="discipulo-rol">${escapeHtml(d.rol) || "Discipulador/a"}</div>
                            <div class="discipulo-contacto">
                                ${d.telefono ? `<span>📞 ${escapeHtml(d.telefono)}</span>` : ''}
                                ${d.email ? `<span>✉️ ${escapeHtml(d.email)}</span>` : ''}
                            </div>
                            <div class="acciones">
                                <button class="btn-editar" data-id="${d.id}" data-action="edit">✏️ Editar</button>
                                <button class="btn-eliminar" data-id="${d.id}" data-action="delete">🗑️ Eliminar</button>
                            </div>
                        </div>
                    `;
                });
            }
            html += `</div></div>`;
        }
        container.innerHTML = html;

        // Asignar eventos a botones de editar/eliminar después de renderizar
        document.querySelectorAll('.btn-editar').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                openEditModal(id);
            });
        });
        document.querySelectorAll('.btn-eliminar').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                deleteDiscipulo(id);
            });
        });
    }

    // Escapar HTML para evitar XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // Modal lógica
    const modal = document.getElementById("modalForm");
    const form = document.getElementById("discipuloForm");
    const modalTitle = document.getElementById("modalTitle");
    const editIdInput = document.getElementById("editId");
    const nombreInput = document.getElementById("nombre");
    const apellidoInput = document.getElementById("apellido");
    const deptSelect = document.getElementById("departamento");
    const rolInput = document.getElementById("rol");
    const telefonoInput = document.getElementById("telefono");
    const emailInput = document.getElementById("email");

    function resetForm() {
        editIdInput.value = "";
        nombreInput.value = "";
        apellidoInput.value = "";
        deptSelect.value = "";
        rolInput.value = "";
        telefonoInput.value = "";
        emailInput.value = "";
        modalTitle.innerText = "➕ Nuevo Discipulador";
    }

    function openEditModal(id) {
        const discipulo = discipuladores.find(d => d.id === id);
        if (!discipulo) return;
        editIdInput.value = discipulo.id;
        nombreInput.value = discipulo.nombre;
        apellidoInput.value = discipulo.apellido;
        deptSelect.value = discipulo.departamento;
        rolInput.value = discipulo.rol || "";
        telefonoInput.value = discipulo.telefono || "";
        emailInput.value = discipulo.email || "";
        modalTitle.innerText = "✏️ Editar Discipulador";
        modal.classList.add("active");
    }

    function openNewModal() {
        resetForm();
        modal.classList.add("active");
    }

    function closeModal() {
        modal.classList.remove("active");
        resetForm();
    }

    // Manejar submit del formulario
    form.addEventListener("submit", (e) => {
        e.preventDefault();
        // Validaciones
        const nombre = nombreInput.value.trim();
        const apellido = apellidoInput.value.trim();
        const departamento = deptSelect.value;
        if (!nombre || !apellido || !departamento) {
            alert("Por favor, completa Nombre, Apellido y Departamento.");
            return;
        }
        const nuevoDiscipulo = {
            id: editIdInput.value || null,
            nombre: nombre,
            apellido: apellido,
            departamento: departamento,
            rol: rolInput.value.trim(),
            telefono: telefonoInput.value.trim(),
            email: emailInput.value.trim()
        };
        saveDiscipulo(nuevoDiscipulo);
        closeModal();
    });

    // Eventos de botones
    document.getElementById("btnNuevoRegistro").addEventListener("click", openNewModal);
    document.getElementById("btnCancelModal").addEventListener("click", closeModal);
    // Cerrar modal si se hace clic en overlay
    modal.addEventListener("click", (e) => {
        if (e.target === modal) closeModal();
    });

    // Inicializar la app
    function init() {
        loadData();
        renderAllDepartments();
    }
    init();
</script>
</body>
</html>
