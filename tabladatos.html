        * { margin:0; padding:0; box-sizing:border-box; }

        .header-panel h1 { color:white; font-size:1.5rem; font-weight:600; display:flex; align-items:center; gap:12px; justify-content:center; margin:0; }
        .toolbar { display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:0.8rem; padding:1.2rem 1.8rem 0.8rem 1.8rem; border-bottom:1px solid #edf2f7; flex-shrink:0; }
        .filters-group { display:flex; flex-wrap:wrap; gap:0.8rem; align-items:center; flex:3; }
        .search-area { flex:2; min-width:180px; }
        .search-input { width:100%; padding:0.7rem 1rem 0.7rem 2.5rem; border:1px solid #e2e8f0; border-radius:48px; font-size:0.9rem; background:#fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%234b5563" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"></circle><line x1="21" y1="21" x2="15" y2="15"></line></svg>') no-repeat 1rem center; background-size:1rem; }

        .table-container { flex:1; overflow:auto; padding:0 1.2rem 1.2rem 1.2rem; min-height:0; scrollbar-width:thin; }
        .data-table { width:100%; border-collapse:collapse; font-size:0.85rem; min-width:1300px; }
        .data-table th { position:sticky; top:0; background:#f9fbfe; padding:1rem 0.9rem; border-bottom:2px solid #e2edf7; }
        .data-table td { padding:0.85rem 0.9rem; border-bottom:1px solid #f0f4fa; }
        .action-icons { display:flex; gap:8px; flex-wrap:wrap; }
        .view-btn, .edit-btn, .delete-btn, .tracking-btn { background:none; border:none; font-size:1rem; cursor:pointer; padding:4px 6px; border-radius:8px; }
        .tracking-btn { color:#16a34a; }
        .tracking-btn:hover { color:#15803d; background:#e0f2e9; }
        .foto-miniatura { width:40px; height:40px; object-fit:cover; border-radius:10px; }
        .sin-foto { width:40px; height:40px; background:#eef2ff; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#1e3a8a; margin:0 auto; }

        </div>
        <div class="table-container">

    function updateFilterOptions() { /* ... */ }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function formatContacto(reg) { /* ... */ }
    function renderFotoCell(fotoBase64) { /* ... */ }
    
    // FUNCIÓN MODIFICADA: openSeguimiento envía mensaje al padre (app.html) para cambiar vista y precargar
    function openSeguimiento(registro) {
        const fullName = `${registro.apellido} ${registro.nombre}`.trim();
        let denominacion = '';
        const iglesia = registro.iglesia || '';
        const denomOptions = ['UAD', 'CEPI', 'MPI', 'CV', 'Consejo de Pastores', 'Pastor Indep.'];
        const exactMatch = denomOptions.find(opt => opt.toLowerCase() === iglesia.toLowerCase());
        if (exactMatch) denominacion = exactMatch;
        else if (iglesia.toLowerCase().includes('consejo')) denominacion = 'Consejo de Pastores';
        else if (iglesia.toLowerCase().includes('pastor')) denominacion = 'Pastor Indep.';
        
        let perfilValue = '';
        switch (registro.categoria) {
            case 'Pastor': perfilValue = '12'; break;
            case 'Discipulador': perfilValue = '7'; break;
            case 'Líder': perfilValue = '5'; break;
            case 'Consultor': perfilValue = '5'; break;
            case 'Nuevo': perfilValue = '15'; break;
            default: perfilValue = '';
        }
        
        const prefill = {
            nombre: fullName,
            denominacion: denominacion,
            perfil: perfilValue,
            proceso: '',
            etapa: '1',
            modulosCompletados: 0
        };
        
        // Guardar en sessionStorage por si acaso
        sessionStorage.setItem('seguimientoPrefill', JSON.stringify(prefill));
        
        // Enviar mensaje al padre (app.html) para que navegue a la vista de seguimiento y precargue
        if (window.parent !== window) {
            window.parent.postMessage({
                action: 'navigateToSeguimiento',
                prefill: prefill
            }, '*');
        } else {
            // Si no está embebido (fallback), abrir en nueva pestaña
            window.location.href = 'seguimiento.html';
        }
    }
    
    function renderTable() {
        const dataToShow = getFilteredAndSorted();
        if (!tbody) return;
        if (dataToShow.length === 0) { tbody.innerHTML = `<tr class="empty-row"><td colspan="10">📭 No hay registros coincidentes</td></tr>`; return; }
        let html = "";
        for (let reg of dataToShow) {
            const fotoHtml = renderFotoCell(reg.foto);
            const contactoHtml = formatContacto(reg);
            html += `<tr>
                        <td>${reg.registroNum}</td>
                        <td style="text-align:center;">${fotoHtml}</td>
                        <td>${escapeHtml(reg.apellido)}</td>
                        <td>${escapeHtml(reg.nombre)}</td>
                        <td>${escapeHtml(reg.dni)}</td>
                        <td>${escapeHtml(reg.categoria)}</td>
                        <td>${escapeHtml(reg.iglesia)}</td>
                        <td>${contactoHtml}</td>
                        <td style="max-width:200px;">${escapeHtml(reg.observaciones) || '—'}</td>
                        <td class="action-icons">
                            <button class="view-btn" data-id="${reg.id}" title="Ver detalles"><i class="fas fa-eye"></i></button>
                            <button class="edit-btn" data-id="${reg.id}" title="Editar"><i class="fas fa-edit"></i></button>
                            <button class="delete-btn" data-id="${reg.id}" title="Eliminar"><i class="fas fa-trash-alt"></i></button>
                            <button class="tracking-btn" data-id="${reg.id}" title="Abrir Seguimiento (dentro de la app)"><i class="fas fa-chart-line"></i></button>
                        </td>
                    </tr>`;
        }
        tbody.innerHTML = html;
        
        document.querySelectorAll('.view-btn').forEach(btn => btn.addEventListener('click', (e) => { const id = parseInt(btn.getAttribute('data-id')); openViewModal(id); }));
        document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', (e) => { const id = parseInt(btn.getAttribute('data-id')); openEditModal(id); }));
        document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', (e) => { const id = parseInt(btn.getAttribute('data-id')); showDeleteConfirmModal(id); }));
        document.querySelectorAll('.tracking-btn').forEach(btn => btn.addEventListener('click', (e) => { const id = parseInt(btn.getAttribute('data-id')); const registro = allRegistros.find(r => r.id === id); if (registro) openSeguimiento(registro); else alert("No se encontró el registro"); }));
    }
    
    // El resto de funciones (openViewModal, openEditModal, saveRegistro, etc.) se mantienen exactamente igual que en la versión original.
