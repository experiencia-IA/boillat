<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Consultor - Boillat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --input-bg: #f3f4f6;
            --accent-dark: #1a1a1a;
            --text-main: #0a192f;
            --text-secondary: #636e72;
            --line-color: #e0e0e0;
            --celeste-bar: #e3f2fd;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
            position: relative;
        }

        /* --- LÍNEAS DE DISEÑO --- */
        body::before, body::after {
            content: "";
            position: fixed;
            left: 0;
            right: 0;
            height: 1px;
            background-color: var(--line-color);
            z-index: 10;
        }
        body::before { top: 40px; }
        body::after { bottom: 40px; }

        .center-bar {
            position: fixed;
            top: 50%;
            left: 0;
            width: 100%;
            height: 120px; 
            background-color: var(--celeste-bar);
            transform: translateY(-50%);
            z-index: 5;
            display: none; 
            animation: fadeIn 0.8s ease;
        }

        #app {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
            z-index: 20;
            position: relative;
        }

        /* --- VISTA SPLASH --- */
        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.8s ease;
        }

        .logo-img {
            width: 65%;
            max-width: 280px;
            height: auto;
            margin-bottom: 2rem;
            animation: pulse 3s infinite ease-in-out;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.05));
        }

        /* Título Principal */
        .main-title {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 0.5rem;
            white-space: nowrap; /* Fuerza una sola línea */
        }

        /* Subtítulo */
        .sub-title {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            font-weight: 300;
            color: var(--text-secondary);
            letter-spacing: 1px;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        /* --- FORMULARIO DE LOGIN --- */
        .login-card {
            background: white;
            padding: 45px 35px;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 16px;
            border: 1.5px solid transparent;
            background-color: var(--input-bg);
            border-radius: 14px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            background-color: #fff;
            border-color: var(--accent-dark);
            outline: none;
        }

        .btn-primary {
            width: 100%;
            background-color: var(--accent-dark);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background-color: #000;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .hidden { display: none !important; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="celeste-bar" class="center-bar"></div>

    <div id="app">
        <div id="view-splash" class="splash-container">
            <img 
                src="https://github.com/experiencia-IA/boillat/blob/main/b.png?raw=true" 
                alt="Logo Boillat" 
                class="logo-img"
            >
            <h1 class="main-title">Red de Multiplicación</h1>
            <p class="sub-title">Aplicación Digital de Gestión y Seguimiento</p>
            
            <button class="btn-primary" style="max-width: 280px;" onclick="showLogin()">
                Ingresar ahora
            </button>
        </div>

        <div id="view-login" class="login-card hidden">
            <h2 style="margin-bottom: 2rem; font-weight: 700;">Acceso Consultor</h2>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="ejemplo@boillat.com">
            </div>

            <div class="form-group">
                <label>Clave de acceso</label>
                <input type="password" placeholder="••••••••">
            </div>

            <button class="btn-primary" onclick="handleAccess()">
                Acceder
            </button>
        </div>
    </div>

    <script>
        function showLogin() {
            const splash = document.getElementById('view-splash');
            const login = document.getElementById('view-login');
            const bar = document.getElementById('celeste-bar');

            splash.style.opacity = '0';
            setTimeout(() => {
                splash.classList.add('hidden');
                bar.style.display = 'block';
                login.classList.remove('hidden');
            }, 300);
        }

        function handleAccess() {
            const login = document.getElementById('view-login');
            login.style.opacity = '0';
            setTimeout(() => {
                login.classList.add('hidden');
                // Redirección directa a la dashboard
                window.location.href = 'app.html';
            }, 300);
        }
    </script>
</body>
</html>
